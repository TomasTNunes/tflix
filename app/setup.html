<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TFLIX — Setup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0d; --bg-elev: #111116; --card: #18181f;
    --line: rgba(255,255,255,0.08); --accent: #e50914; --accent-h: #ff222e;
    --accent-soft: rgba(229,9,20,0.16); --text: #f4f4f7; --muted: #9a9aa6;
    --green: #4ad17e; --red: #ff6b6b;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
    padding: 2.4rem 2.2rem; user-select: none;
  }
  .logo {
    font-size: 2rem; font-weight: 800; letter-spacing: -0.04em;
    color: var(--accent); text-shadow: 0 0 26px rgba(229,9,20,0.55);
    margin-bottom: 1.4rem;
  }
  h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
  p.lead { font-size: 0.92rem; line-height: 1.55; color: var(--muted); margin-bottom: 1.6rem; }
  p.lead a { color: var(--accent-h); cursor: pointer; text-decoration: underline; }
  label { display: block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
          text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  textarea {
    width: 100%; min-height: 96px; resize: vertical; user-select: text;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    color: var(--text); font-family: ui-monospace, 'Cascadia Code', monospace;
    font-size: 0.82rem; line-height: 1.5; padding: 0.8rem 0.9rem; outline: none;
    transition: border-color .2s, box-shadow .2s; word-break: break-all;
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .status {
    min-height: 1.4rem; margin: 0.9rem 0 0.2rem; font-size: 0.85rem; font-weight: 600;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .status.ok    { color: var(--green); }
  .status.err   { color: var(--red); }
  .status.info  { color: var(--muted); }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .actions { margin-top: auto; display: flex; gap: 0.7rem; padding-top: 1.4rem; }
  button {
    font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer;
    padding: 0.8rem 1.5rem; border-radius: 7px; border: none;
    transition: transform .12s, background .2s, opacity .2s;
  }
  button:active { transform: scale(.97); }
  .btn-primary { background: #fff; color: #0a0a0d; flex: 1; }
  .btn-primary:hover { background: rgba(255,255,255,0.85); }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .btn-ghost { background: rgba(70,70,80,0.7); color: #fff; }
  .btn-ghost:hover { background: rgba(110,110,120,0.6); }
</style>
</head>
<body>
  <div class="logo">TFLIX</div>
  <h1>Welcome 👋</h1>
  <p class="lead">
    TFLIX needs a <b>TMDB API Read Access Token</b> to fetch movies &amp; TV shows.
    Create one for free under your account's API settings on
    <a id="tmdb-link">themoviedb.org</a>, then paste the <i>API Read Access Token</i> (v4 auth) below.
  </p>

  <label for="token">TMDB API Read Access Token</label>
  <textarea id="token" placeholder="eyJhbGciOiJIUzI1NiJ9..." spellcheck="false" autocomplete="off"></textarea>

  <div class="status info" id="status"></div>

  <div class="actions">
    <button class="btn-ghost" id="cancel">Quit</button>
    <button class="btn-primary" id="save">Save &amp; Launch</button>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const tokenEl  = $('token');
  const statusEl = $('status');
  const saveBtn  = $('save');

  function setStatus(kind, msg, spinner = false) {
    statusEl.className = 'status ' + kind;
    statusEl.innerHTML = (spinner ? '<span class="spinner"></span>' : '') + msg;
  }

  $('tmdb-link').addEventListener('click', () => {
    // Opened in the system browser via setWindowOpenHandler
    window.open('https://www.themoviedb.org/settings/api', '_blank');
  });

  $('cancel').addEventListener('click', () => window.tflix.cancel());

  async function validateAndSave() {
    const token = tokenEl.value.trim();
    if (!token) { setStatus('err', 'Please paste your token first.'); tokenEl.focus(); return; }

    saveBtn.disabled = true;
    setStatus('info', 'Verifying token with TMDB…', true);

    try {
      const r = await fetch('https://api.themoviedb.org/3/authentication', {
        headers: { Authorization: 'Bearer ' + token, accept: 'application/json' },
      });
      if (r.ok) {
        setStatus('ok', 'Token verified — launching TFLIX…');
        setTimeout(() => window.tflix.saveToken(token), 350);
      } else if (r.status === 401) {
        saveBtn.disabled = false;
        setStatus('err', 'Invalid token. Make sure you copied the API Read Access Token (v4).');
      } else {
        saveBtn.disabled = false;
        setStatus('err', 'Unexpected response (' + r.status + '). Try again.');
      }
    } catch (e) {
      // Network blocked? Allow saving anyway so the user isn't stuck offline.
      saveBtn.disabled = false;
      setStatus('err', 'Could not reach TMDB. Check your connection, then Save again to use anyway.');
      saveBtn.textContent = 'Save Anyway';
      saveBtn.onclick = () => window.tflix.saveToken(token);
    }
  }

  saveBtn.addEventListener('click', validateAndSave);
  tokenEl.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') validateAndSave();
  });
  tokenEl.focus();
</script>
</body>
</html>
